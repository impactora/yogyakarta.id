services:
  web:
    container_name: yogyakarta-id
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3500"
    environment:
      NODE_ENV: production
      PORT: 3000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
    restart: unless-stopped
